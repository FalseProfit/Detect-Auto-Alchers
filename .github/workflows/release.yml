name: Release sideload jar

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build sideload jar
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Build and test sideload jar
        run: ./gradlew clean test sideloadJar

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: detect-auto-alchers-sideload
          path: build/sideloaded-plugins/detect-auto-alchers.jar
          if-no-files-found: error

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          JAR_PATH: build/sideloaded-plugins/detect-auto-alchers.jar
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$JAR_PATH" --clobber
          else
            gh release create "$TAG_NAME" "$JAR_PATH" \
              --title "$TAG_NAME" \
              --notes "Sideload jar for Detect Auto Alchers."
          fi
